<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语小剧场 | EmotionLens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "幼圆", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f8ff 0%, #fff9e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .main-title {
            font-size: 32px;
            color: #3d5a80;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 20px;
            color: #666;
        }

        /* 情绪选择区 */
        .emotion-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .emotion-card {
            padding: 30px 15px;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }
        .emotion-card:hover {
            transform: translateY(-3px);
        }
        .emotion-card.selected {
            border-color: #aed6f1;
            background: linear-gradient(120deg, #f7fbff, #fff6d9);
        }
        .emo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .emo-name {
            font-size: 22px;
            color: #444;
        }

        /* 开始按钮 */
        .start-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            color: white;
            background: linear-gradient(90deg, #87b8e8, #aed6f1);
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 40px;
        }
        .start-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 对话场景区 */
        .scene-area {
            display: none;
        }
        .scene-title {
            text-align: center;
            font-size: 24px;
            color: #3d5a80;
            margin-bottom: 30px;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 20px;
            border-radius: 18px;
            font-size: 20px;
            line-height: 1.7;
        }
        .story-bubble {
            background: #fff;
            color: #444;
            align-self: flex-start;
        }
        .guide-bubble {
            background: #e3f2fd;
            color: #3d5a80;
            align-self: flex-end;
        }
        .guide-avatar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            justify-content: flex-end;
        }
        .avatar-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #aed6f1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        .avatar-name {
            font-size: 16px;
            color: #666;
        }

        /* 输入区 */
        .input-area {
            margin-top: 40px;
            text-align: center;
        }
        .input-tip {
            font-size: 18px;
            color: #777;
            margin-top: 10px;
        }
        .mic-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #aed6f1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            color: white;
            font-size: 32px;
            cursor: pointer;
        }

        /* 加载/错误状态 */
        .loading-text, .error-text {
            text-align: center;
            font-size: 20px;
            padding: 60px 0;
        }
        .loading-text {
            color: #7294bb;
        }
        .error-text {
            color: #e06666;
        }

        /* 移动端适配 */
        @media (max-width: 550px) {
            .main-title {
                font-size: 26px;
            }
            .emotion-card {
                padding: 20px 10px;
            }
            .chat-bubble {
                font-size: 18px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 初始选择页 -->
        <div id="selectPage">
            <div class="header">
                <h1 class="main-title">✨ EmotionLens - 情绪词汇大探险 ✨</h1>
                <p class="subtitle">今天你想和哪个小怪物一起玩呢？</p >
            </div>

            <div class="emotion-select">
                <div class="emotion-card" data-emotion="生气" style="background: #fce4ec;">
                    <div class="emo-icon">😤</div>
                    <div class="emo-name">生气</div>
                </div>
                <div class="emotion-card" data-emotion="害怕" style="background: #fff3e0;">
                    <div class="emo-icon">😨</div>
                    <div class="emo-name">害怕</div>
                </div>
                <div class="emotion-card" data-emotion="难过" style="background: #eceff1;">
                    <div class="emo-icon">😢</div>
                    <div class="emo-name">难过</div>
                </div>
                <div class="emotion-card" data-emotion="焦虑" style="background: #e0e0e0;">
                    <div class="emo-icon">😰</div>
                    <div class="emo-name">焦虑</div>
                </div>
            </div>

            <button class="start-btn" id="startBtn" disabled>🚀 开始探险！</button>
        </div>

        <!-- 对话场景页 -->
        <div class="scene-area" id="scenePage">
            <h2 class="scene-title">🌈 情绪探险中... 🌈</h2>
            <div class="chat-container" id="chatBox">
                <!-- 故事和引导内容会在这里动态加载 -->
            </div>

            <div class="input-area">
                <div class="mic-icon">🎤</div>
                <p class="input-tip">用文字回答</p >
            </div>
        </div>
    </div>

    <script>
        const emotionCards = document.querySelectorAll('.emotion-card');
        const startBtn = document.getElementById('startBtn');
        const selectPage = document.getElementById('selectPage');
        const scenePage = document.getElementById('scenePage');
        const chatBox = document.getElementById('chatBox');
        const API_BASE = 'http://192.168.10.7:8000';
        const cache = new Map();

        let selectedEmotion = null;
        let activeController = null;

        function renderStory(storyPart, guidePart = "") {
            let chatHtml = `
                <div class="chat-bubble story-bubble">
                    <strong>📖 故事场景</strong><br><br>
                    ${storyPart || "正在编织故事..."}
                </div>
            `;
            if (guidePart) {
                chatHtml += `
                    <div class="guide-avatar">
                        <span class="avatar-name">星愿姐姐</span>
                        <div class="avatar-circle">👩‍🏫</div>
                    </div>
                    <div class="chat-bubble guide-bubble">${guidePart}</div>
                `;
            }
            chatBox.innerHTML = chatHtml;
        }

        function parseSceneText(sceneText) {
            if (!sceneText || typeof sceneText !== 'string') {
                return { storyPart: "很抱歉，故事加载出现了小问题，请稍后再试~", guidePart: "" };
            }
            if (sceneText.includes('【星愿姐姐引导】')) {
                const parts = sceneText.split('【星愿姐姐引导】');
                return {
                    storyPart: (parts[0] || "").trim(),
                    guidePart: (parts[1] || "").trim()
                };
            }
            return { storyPart: sceneText.trim(), guidePart: "" };
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
            const controller = options.signal ? null : new AbortController();
            const signal = options.signal || controller.signal;
            const timer = setTimeout(() => {
                if (controller) controller.abort();
            }, timeoutMs);
            try {
                return await fetch(url, { ...options, signal });
            } finally {
                clearTimeout(timer);
            }
        }

        async function fetchSceneJSON(emotion, signal, refresh = false, nonce = "") {
            // 兼容老接口
            const res = await fetchWithTimeout(`${API_BASE}/api/generate_scene`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emotion, age: 6, refresh, nonce }),
                signal
            }, 12000);
            if (!res.ok) throw new Error('请求失败，状态码：' + res.status);
            return await res.json();
        }

        async function fetchSceneStream(emotion, signal, onChunk, refresh = false, nonce = "") {
            const res = await fetchWithTimeout(`${API_BASE}/api/generate_scene_stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emotion, age: 6, refresh, nonce }),
                signal
            }, 15000);
            if (!res.ok || !res.body) throw new Error('流式请求失败，状态码：' + res.status);

            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullText = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                if (chunk) {
                    fullText += chunk;
                    onChunk(fullText);
                }
            }
            return { scene: fullText };
        }

        async function prewarmInterests() {
            const emotions = Array.from(emotionCards)
                .map(card => card.dataset.emotion)
                .filter(Boolean);
            if (!emotions.length) return;
            try {
                await fetchWithTimeout(`${API_BASE}/api/prewarm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emotions, age: 6 })
                }, 6000);
            } catch (e) {
                // 预热失败不影响主流程
                console.warn('prewarm failed', e);
            }
        }

        // 情绪卡片选中
        emotionCards.forEach(card => {
            card.addEventListener('click', () => {
                emotionCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedEmotion = card.dataset.emotion;
                startBtn.disabled = false;
            });
        });

        // 页面打开即预热常见选项，减少首次等待
        prewarmInterests();

        // 点击开始探险：优先秒开缓存，再流式刷新
        startBtn.addEventListener('click', async () => {
            if (!selectedEmotion) return;

            if (activeController) activeController.abort();
            activeController = new AbortController();

            selectPage.style.display = 'none';
            scenePage.style.display = 'block';
            chatBox.innerHTML = `<div class="loading-text">正在加载情绪小故事，请稍等...</div>`;

            // 1) 先用缓存，体感“立即出字”
            if (cache.has(selectedEmotion)) {
                const cached = cache.get(selectedEmotion);
                const parsed = parseSceneText(cached.scene);
                renderStory(parsed.storyPart, parsed.guidePart);
            }

            try {
                let data = null;
                const nonce = `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
                const forceFresh = true;

                // 2) 优先流式接口（边到边显示）
                try {
                    data = await fetchSceneStream(selectedEmotion, activeController.signal, (partialScene) => {
                        renderStory(partialScene, "");
                    }, forceFresh, nonce);
                } catch (streamErr) {
                    // 3) 流式失败降级普通 JSON 接口
                    data = await fetchSceneJSON(selectedEmotion, activeController.signal, forceFresh, nonce);
                }

                const parsed = parseSceneText(data.scene);
                renderStory(parsed.storyPart, parsed.guidePart);

                // 4) 写入内存缓存
                cache.set(selectedEmotion, data);
            } catch (error) {
                if (error.name === 'AbortError') return;
                chatBox.innerHTML = `<div class="error-text">生成失败，请稍后再试</div>`;
                console.error("完整错误信息：", error);
            }
        });
    </script>
</body>
</html>
